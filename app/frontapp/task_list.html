<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>タスク管理アプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

    <nav class="ps-1 pt-4 pb-1 mb-2 bg-primary text-white">
        <div class="d-flex align-items-center mb-4">
            <h2 class="mb-0">📝 タスクアプリ</h2>
            <div class="ms-auto">
                <div class="d-flex gap-2 pe-3">
                    <button type="button" class="btn btn-success me-md-2" id="addButton">タスク追加</button>
                    <div class="btn-group dropend" role="group">
                        <button type="button" class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                        並び替える
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" id="sortDeadline">締切順</a></li>
                            <li><a class="dropdown-item" id="sortStatus">状態順</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        
        <h2 id="username" class="mb-0 ms-3"></h2>
    </nav>
    <div class="container">

        <form id="createTaskForm" class="col"></form>
        <form id="updateTaskForm" class="col"></form>

        <div class="row row-cols-3" id="taskList"></div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="task_list.js"></script>
</body>
</html>
