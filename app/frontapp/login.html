<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="p-3 mb-2 bg-primary text-white">
        <h2>📝 タスクアプリ ログインページ</h2>
    </nav>

    <div class="container mt-5">
        <div id="errorContainer"></div>
        <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px;">
            <form id="loginUserForm">
                <div class="mb-3">
                    <label for="email" class="form-label">メールアドレス</label>
                    <input type="text" id="email" class="form-control" placeholder="メールアドレスを入力(example@gmail.com)" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">パスワード</label>
                    <input type="password" id="password" class="form-control" placeholder="パスワード（6文字以上）" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">入力完了</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
